<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Retro Win95</title>
    <style>
        /* Estilo Retro Windows 95 */
        body {
            background-color: #008080; /* Cor clássica da área de trabalho */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Tahoma', sans-serif;
        }

        .calc-container {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 10px;
            box-shadow: 2px 2px 0px #000;
            width: 250px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        #display {
            width: 100%;
            height: 35px;
            background-color: #fff;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            margin-bottom: 15px;
            text-align: right;
            padding: 5px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        button {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 10px;
            font-family: 'Tahoma', sans-serif;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding-top: 11px;
            padding-left: 11px;
            padding-bottom: 9px;
            padding-right: 9px;
        }

        .operator {
            color: #800000;
        }

        .btn-clear {
            grid-column: span 2;
            color: #ff0000;
        }

        .btn-equal {
            color: #000080;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="title-bar">
        <span>Calculadora v1.0</span>
        <span>✕</span>
    </div>
    
    <input type="text" id="display" disabled value="0">

    <div class="buttons-grid">
        <button class="btn-clear" onclick="clearDisplay()">C</button>
        <button onclick="backspace()">CE</button>
        <button class="operator" onclick="appendOperator('/')">/</button>

        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">*</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>

        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="btn-equal" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let currentInput = '0';

    function updateDisplay() {
        display.value = currentInput;
    }

    function appendNumber(num) {
        if (currentInput === '0') {
            currentInput = num;
        } else {
            currentInput += num;
        }
        updateDisplay();
    }

    function appendOperator(op) {
        const lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + op;
        } else {
            currentInput += op;
        }
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '0';
        updateDisplay();
    }

    function backspace() {
        currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
        updateDisplay();
    }

    function calculate() {
        try {
            // Uso do eval para simplicidade neste exemplo de UI
            currentInput = eval(currentInput).toString();
        } catch (e) {
            currentInput = "Erro";
        }
        updateDisplay();
    }
</script>

</body>
</html>
